<script>
  // Hide all sections
  function hideAll() {
    document.getElementById("home").style.display = "none";
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("agents").style.display = "none";
  }

  // Navigation
  function goHome() {
    hideAll();
    document.getElementById("home").style.display = "block";
  }

  function goDashboard() {
    hideAll();
    document.getElementById("dashboard").style.display = "block";
  }

  function goAgents() {
    hideAll();
    document.getElementById("agents").style.display = "block";
  }

  // ✅ REAL BACKEND-CONNECTED AGENT
  async function selectAgent(name) {
    const output = document.getElementById("agent-output");
    output.innerText = "Processing with backend...";

    try {
      const response = await fetch("/api/agent", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          agent: name,
          prompt: "Create an invoice"
        })
      });

      if (!response.ok) {
        throw new Error("Backend error: " + response.status);
      }

      const data = await response.json();
      output.innerText = data.result;
    } catch (error) {
      console.error(error);
      output.innerText =
        "❌ Failed to contact backend. Check /api/agent.";
    }
  }
</script>
